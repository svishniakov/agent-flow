interface:
  display_name: "Agent Flow"
  short_description: "Route work from idea to verified result with bundled subagents"
  brand_color: "#2563EB"
  default_prompt: "Use $agent-flow only when the latest user request contains Agent Flow, AgentFlow, $agent-flow, or agent-flow anywhere in the message. No preflight: unmarked requests must not load, check, mention, or route through Agent Flow. Do not run brainstorming first. For invoked tasks, read primary local project memory in .agent-work/tasks before planning, infra commands, product edits, or delegation. Route through the smallest useful budget and finish with verification evidence. Light budget stays solo for implementation ownership, but file-changing implementation/change work still requires Mandatory Independent QA Review Gate with a real reviewer.qa subagent before positive final. Standard and release budgets may use subagents when the orchestrator decides they add real verification or parallelism value. When subagents are used, use bundled role files in agents/<role>.md and stable identities from agents/agent-identities.json."

policy:
  allow_implicit_invocation: false
