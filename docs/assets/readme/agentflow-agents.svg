<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-label="AgentFlow role cards">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#343431"/><stop offset="1" stop-color="#2d2d2b"/>
    </linearGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#f9f9f7" stroke-opacity=".045" stroke-width="1"/>
    </pattern>
    <style>
      .t{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;fill:#f9f9f7}
      .m{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;fill:#c7c1b8}
      .f{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;fill:#928c82}
    </style>
  </defs>
  <rect width="1200" height="520" rx="30" fill="url(#bg)"/>
  <rect width="1200" height="520" rx="30" fill="url(#grid)"/>
  <text x="70" y="76" class="t" font-size="34" font-weight="900">25 role files</text>
  <text x="70" y="112" class="m" font-size="18">Each role carries its own model, reasoning, tools, skills, and handoff contract.</text>
  <line x1="70" y1="148" x2="1130" y2="148" stroke="#f9f9f7" stroke-opacity=".1"/>
  <g transform="translate(70 178)">
    <g>
      <rect width="200" height="118" rx="18" fill="#343431" stroke="#cc7d5e" stroke-opacity=".4"/>
      <text x="22" y="38" class="f" font-size="12" font-weight="800" letter-spacing="2">PLANNING</text><text x="22" y="72" class="t" font-size="23" font-weight="850">architect</text><text x="22" y="98" class="m" font-size="14">gpt-5.5 · high</text>
    </g>
    <g transform="translate(220 0)">
      <rect width="200" height="118" rx="18" fill="#343431" stroke="#f9f9f7" stroke-opacity=".12"/>
      <text x="22" y="38" class="f" font-size="12" font-weight="800" letter-spacing="2">REVIEW</text><text x="22" y="72" class="t" font-size="23" font-weight="850">reviewer</text><text x="22" y="98" class="m" font-size="14">risk · regression</text>
    </g>
    <g transform="translate(440 0)">
      <rect width="200" height="118" rx="18" fill="#343431" stroke="#cc7d5e" stroke-opacity=".4"/>
      <text x="22" y="38" class="f" font-size="12" font-weight="800" letter-spacing="2">VERIFY</text><text x="22" y="72" class="t" font-size="23" font-weight="850">qa-verifier</text><text x="22" y="98" class="m" font-size="14">checks · evidence</text>
    </g>
    <g transform="translate(660 0)">
      <rect width="200" height="118" rx="18" fill="#343431" stroke="#f9f9f7" stroke-opacity=".12"/>
      <text x="22" y="38" class="f" font-size="12" font-weight="800" letter-spacing="2">SOURCE</text><text x="22" y="72" class="t" font-size="23" font-weight="850">researcher</text><text x="22" y="98" class="m" font-size="14">facts · browser</text>
    </g>
    <g transform="translate(880 0)">
      <rect width="200" height="118" rx="18" fill="#343431" stroke="#cc7d5e" stroke-opacity=".4"/>
      <text x="22" y="38" class="f" font-size="12" font-weight="800" letter-spacing="2">DESIGN</text><text x="22" y="72" class="t" font-size="23" font-weight="850">visual-qa</text><text x="22" y="98" class="m" font-size="14">screens · UI</text>
    </g>
    <g transform="translate(0 144)">
      <rect width="200" height="118" rx="18" fill="#343431" stroke="#f9f9f7" stroke-opacity=".12"/>
      <text x="22" y="38" class="f" font-size="12" font-weight="800" letter-spacing="2">WEB</text><text x="22" y="72" class="t" font-size="22" font-weight="850" textLength="156" lengthAdjust="spacingAndGlyphs">frontend-worker</text><text x="22" y="98" class="m" font-size="14">UI · browser</text>
    </g>
    <g transform="translate(220 144)">
      <rect width="200" height="118" rx="18" fill="#343431" stroke="#cc7d5e" stroke-opacity=".4"/>
      <text x="22" y="38" class="f" font-size="12" font-weight="800" letter-spacing="2">API</text><text x="22" y="72" class="t" font-size="22" font-weight="850" textLength="152" lengthAdjust="spacingAndGlyphs">backend-worker</text><text x="22" y="98" class="m" font-size="14">DB · queues</text>
    </g>
    <g transform="translate(440 144)">
      <rect width="200" height="118" rx="18" fill="#343431" stroke="#f9f9f7" stroke-opacity=".12"/>
      <text x="22" y="38" class="f" font-size="12" font-weight="800" letter-spacing="2">TS</text><text x="22" y="72" class="t" font-size="22" font-weight="850" textLength="158" lengthAdjust="spacingAndGlyphs">typescript-worker</text><text x="22" y="98" class="m" font-size="14">types · tests</text>
    </g>
    <g transform="translate(660 144)">
      <rect width="200" height="118" rx="18" fill="#343431" stroke="#cc7d5e" stroke-opacity=".4"/>
      <text x="22" y="38" class="f" font-size="12" font-weight="800" letter-spacing="2">PY</text><text x="22" y="72" class="t" font-size="22" font-weight="850" textLength="142" lengthAdjust="spacingAndGlyphs">python-worker</text><text x="22" y="98" class="m" font-size="14">scripts · tooling</text>
    </g>
    <g transform="translate(880 144)">
      <rect width="200" height="118" rx="18" fill="#343431" stroke="#f9f9f7" stroke-opacity=".12"/>
      <text x="22" y="38" class="f" font-size="12" font-weight="800" letter-spacing="2">APPLE</text><text x="22" y="72" class="t" font-size="23" font-weight="850">ios-worker</text><text x="22" y="98" class="m" font-size="14">SwiftUI · sim</text>
    </g>
  </g>
</svg>
