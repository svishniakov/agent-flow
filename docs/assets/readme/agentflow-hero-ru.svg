    <circle cx="722" cy="156" r="5" fill="#cc7d5e" opacity=".3">
      <animate attributeName="cy" values="156;56" dur="6.8s" begin="-3.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;.3;.3;0" dur="6.8s" begin="-3.4s" repeatCount="indefinite"/>
